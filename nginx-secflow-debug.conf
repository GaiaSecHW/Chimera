user root;
worker_processes auto;
error_log /tmp/nginx-error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /tmp/nginx-access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;

    upstream secflow-backend {
        server localhost:3000;
    }

    upstream workflow-backend {
        server localhost:8000;
    }

    # codemap-lite manager (知识图谱构建/serve 编排)。改成实际 manager 地址;
    # 与 manager 同机时用 127.0.0.1:8090。
    upstream codemap-manager {
        server 127.0.0.1:8090;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 10240m;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Turing App Security (M2M 任务 + 上传)。前端直接用 /turing-app-security/* 前缀,
        # 不做 rewrite,原样反代到 turing-app-security 服务,
        location /turing-app-security/ {
            proxy_pass http://turing-app-security;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/workflow {
            proxy_pass http://workflow-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 知识图谱:前端调 /api/codemap-manager/*,反代到 manager。尾斜杠剥前缀,
        # /api/codemap-manager/tasks → manager 的 /tasks。
        location /api/codemap-manager/ {
            proxy_pass http://codemap-manager/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SecOcto 统一代理入口:经由 secocto-ui 反代到后端 7 个服务
        # (vulns/skills/tasks/wiki/memories/gitea/minio)。proxy_pass 不带尾斜杠,
        # 保留完整 /api/secocto/v1/<svc>/<path> 透传给 secocto-ui,
        # 由 secocto-ui 的 nginx 负责按 <svc> 前缀分发到对应后端。
        #
        # 上游 secflow-app-secocto 是 K8s Service 名（与 turing-app-security 模式一致），
        # 端口 80 → secocto-ui 容器 8080。Service DNS 由 K8s kube-dns 解析。
        # 部署上下文:
        #   - K8s 集群:   Service secflow-app-secocto.secflow-ns.svc:80   ✅
        #   - docker compose: 需要 secocto-ui 容器加 container_name: secflow-app-secocto
        #   - 本机独立部署: 改 /etc/hosts 或 nginx 上游为 127.0.0.1:<host-port>
        #
        # 注: K8s 部署时此 location 通常不会被命中 —— secflow-ingress patch 已把
        # /api/secocto 直接路由到 secflow-app-secocto Service,流量不再经 chimera-frontend。
        # 见 Chimera-deploy/02-secflow-app/patch/secocto-secflow-ingress-append.json-patch.json。
        # 保留此 location 作为非 K8s 部署的兜底。
        location /api/secocto/v1/ {
            proxy_pass http://secflow-app-secocto;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # secocto-ui 内部 nginx 已设流式直通和 1024m body-size,
            # 这里 ingress 级别也要放开,避免大文件/SSE 在第二层被截断或缓冲。
            proxy_http_version  1.1;
            proxy_buffering     off;
            proxy_request_buffering off;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            client_max_body_size 1024m;
        }

        location / {
            proxy_pass http://secflow-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
