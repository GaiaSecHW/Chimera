user root;
worker_processes auto;
error_log /tmp/nginx-error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /tmp/nginx-access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;

    upstream secflow-backend {
        server localhost:3000;
    }

    upstream workflow-backend {
        server localhost:8000;
    }

    # codemap-lite manager (知识图谱构建/serve 编排)。改成实际 manager 地址;
    # 与 manager 同机时用 127.0.0.1:8090。
    upstream codemap-manager {
        server 127.0.0.1:8090;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 10240m;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Turing App Security (M2M 任务 + 上传)。前端直接用 /turing-app-security/* 前缀,
        # 不做 rewrite,原样反代到 turing-app-security 服务,
        location /turing-app-security/ {
            proxy_pass http://turing-app-security;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/workflow {
            proxy_pass http://workflow-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 知识图谱:前端调 /api/codemap-manager/*,反代到 manager。尾斜杠剥前缀,
        # /api/codemap-manager/tasks → manager 的 /tasks。
        location /api/codemap-manager/ {
            proxy_pass http://codemap-manager/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SecOcto 统一代理入口:经由 secocto-ui:18888 反代到后端 6 个服务
        # (vulns/skills/tasks/wiki/memories/gitea)。proxy_pass 不带尾斜杠,
        # 保留完整 /api/secocto/v1/<svc>/<path> 透传给 secocto-ui,
        # 由 secocto-ui 的 nginx 负责按 <svc> 前缀分发到对应后端。
        location /api/secocto/v1/ {
            proxy_pass http://127.0.0.1:18888;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://secflow-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
