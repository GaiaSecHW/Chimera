<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0%" stop-color="#E8C04A"/>
      <stop offset="50%" stop-color="#FF6B2B"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <linearGradient id="lionGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A030"/>
      <stop offset="100%" stop-color="#E8C04A"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <circle cx="16" cy="16" r="15" fill="#0D1B2A"/>
  <!-- 外环 -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#1E3A5F" stroke-width="1"/>

  <!-- 独首剪影 (狮首侧面, 极简) -->
  <path d="M 17,5 C 19,3 23,4 24,7 C 25,10 24,13 23,15 L 25,16 C 26,18 24,19 23,19 C 21,19 20,18 19,19 C 17,20 15,18 14,16 C 13,14 14,12 16,10 C 17,8 17,6 17,5 Z" fill="url(#lionGrad)" stroke="#B89020" stroke-width="0.3"/>

  <!-- 狮眼 -->
  <circle cx="21" cy="9" r="0.8" fill="#FFE066"/>

  <!-- 火焰弧线 (1 条) -->
  <path d="M 25,16 C 27,12 29,8 30,5" fill="none" stroke="url(#flameGrad)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- 底部蛇尾曲线暗示 -->
  <path d="M 11,28 C 10,24 9,20 10,16 C 11,12 10,9 12,7" fill="none" stroke="#2A5A8F" stroke-width="1" stroke-linecap="round"/>

  <!-- 蛇眼 -->
  <circle cx="12" cy="7" r="0.5" fill="#FF6B2B"/>
</svg>